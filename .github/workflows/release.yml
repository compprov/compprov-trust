# Publish compprov-core to Maven Central.
#
# Trigger options:
#   - Push a tag in the form v<semver>  (e.g. v0.1.0)  — fully automated.
#   - workflow_dispatch with an explicit version string  — manual / hotfix.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   OSSRH_*   Sonatype
#   GPG_*     Gpg
name: Release to Maven Central

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'   # e.g. v0.1.0, v1.2.3-rc1

  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0)'
        required: true

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    environment:
      name: release-production
    permissions:
      contents: read

    steps:
      # -----------------------------------------------------------------------
      - name: Checkout source
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Determine the release version.
      # From a tag  → strip the leading "v"  (v0.1.0 → 0.1.0)
      # From manual → use the workflow_dispatch input directly
      - name: Resolve release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"
          else
            TAG="${{ github.ref_name }}"
            echo "RELEASE_VERSION=${TAG#v}" >> "$GITHUB_ENV"
          fi

      # -----------------------------------------------------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
      # -----------------------------------------------------------------------
      # Import the GPG private key so maven-gpg-plugin can sign the artifacts.
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@e89d40939c28e39f97cf32126055eeae86ba74ec  # v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      # -----------------------------------------------------------------------
      # Pin the pom.xml version to the release version (strips -SNAPSHOT).
      - name: Set Maven project version
        run: mvn --batch-mode versions:set -DnewVersion="${RELEASE_VERSION}" -DgenerateBackupPoms=false

      # -----------------------------------------------------------------------
      # Build, sign, and publish to Maven Central.
      # The `release` profile activates the source/javadoc/gpg/central plugins.
      - name: Deploy to Maven Central
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: mvn --batch-mode --no-transfer-progress -P release deploy
